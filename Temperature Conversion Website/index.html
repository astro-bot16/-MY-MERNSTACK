<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="title">Temperature Convertor <span class="temp-icon"><i class="fas fa-temperature-half" style="font-size: 20px; color: black;"></i></span></div>
        <div id="celsius" class="celsius">
            <label for="celsius">Temperature in °C</label>
            <input type="number" placeholder="Celsius" required>
              <span class="icon">&#8451</span>
        </div>
        <div id="farenheit" class="farenheit">
              <label for="farenheit">Temperature in °F</label>
            <input type="number" placeholder="Farenheit" required>
             <span class="icon">&#8457</span>
        </div>
         <div id="kelvin" class="kelvin">
              <label for="kelvin">Temperature in K</label>
            <input type="number" placeholder="Kelvin" required>
            <span class="icon">&#8490</span>
        </div>
        <div class="clear">
             <button>CLEAR</button>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
